<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MINI BOT DEV SHADOW - PANEL</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background: #f5f7fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
    }

    /* ===== BANNIÈRE ===== */
    .banner {
      width: 100%;
      height: 130px;
      overflow: hidden;
      position: relative;
    }

    .banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .banner-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(245,247,250,0.9));
    }

    /* ===== LOGO ===== */
    .logo-wrap {
      margin-top: -40px;
      z-index: 10;
      position: relative;
      display: flex;
      justify-content: center;
    }

    .logo-wrap img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid #ffffff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      object-fit: cover;
    }

    /* ===== TITRE ===== */
    .title-block {
      text-align: center;
      margin: 14px 0 10px;
    }

    .title-block h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #111;
    }

    .title-block h1 .mini   { color: #00b36b; }
    .title-block h1 .bot    { color: #222; }
    .title-block h1 .shadow { color: #6c3de8; }

    .title-block .badge {
      display: inline-block;
      margin-top: 6px;
      background: #f0ebff;
      color: #6c3de8;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 14px;
      border-radius: 20px;
      letter-spacing: 1px;
    }

    /* ===== CONTAINER ===== */
    .container {
      width: 100%;
      max-width: 460px;
      padding: 16px 20px 40px;
    }

    /* ===== BOX ===== */
    .box {
      width: 100%;
      padding: 36px 28px;
      background: #ffffff;
      border-radius: 20px;
      border: 1px solid #ebebeb;
      box-shadow: 0 4px 30px rgba(0,0,0,0.08);
      position: relative;
      overflow: hidden;
    }

    /* Accent top */
    .box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #00b36b, #6c3de8);
    }

    /* ===== ICON ===== */
    .icon-wrapper {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #00b36b, #00cc7a);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,179,107,0.35);
      animation: iconPulse 2.5s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(0,179,107,0.35); }
      50%       { box-shadow: 0 4px 30px rgba(0,179,107,0.6); }
    }

    .icon-wrapper i {
      font-size: 32px;
      color: #fff;
    }

    /* ===== TEXTES ===== */
    .centered-text {
      text-align: center;
      color: #111;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .sub-text {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    /* ===== INPUT ===== */
    .input-container {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 16px;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #6c3de8;
      font-size: 17px;
      z-index: 1;
    }

    .input-container input {
      width: 100%;
      padding: 15px 16px 15px 48px;
      background: #f8f9fb;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      color: #222;
      font-size: 15px;
      transition: all 0.25s ease;
      font-family: inherit;
    }

    .input-container input:focus {
      outline: none;
      border-color: #6c3de8;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(108,61,232,0.1);
    }

    .input-container input::placeholder { color: #bbb; }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    /* ===== BUTTON ===== */
    .input-container button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #6c3de8, #9b6ff5);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(108,61,232,0.3);
      position: relative;
      overflow: hidden;
    }

    .input-container button::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      animation: shine 2.5s linear infinite;
    }

    @keyframes shine {
      0%   { left: -100%; }
      100% { left: 160%; }
    }

    .input-container button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108,61,232,0.4);
    }

    .input-container button:active { transform: translateY(0); }

    /* ===== WAITING ===== */
    #waiting-message {
      display: none;
      color: #6c3de8;
      font-weight: 600;
      text-align: center;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    #pair { min-height: 50px; margin-top: 15px; }

    /* ===== CODE COPY ===== */
    #copy {
      display: inline-block;
      padding: 16px 22px;
      background: #f7f3ff;
      border: 2px dashed #6c3de8;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 4px;
    }

    #copy:hover {
      background: #ede8ff;
      transform: scale(1.03);
      box-shadow: 0 4px 20px rgba(108,61,232,0.2);
    }

    #copy span {
      font-family: 'Courier New', monospace;
      font-size: 20px;
      font-weight: 800;
      color: #111;
    }

    /* ===== DIVIDER ===== */
    .divider {
      height: 1px;
      background: #f0f0f0;
      margin: 22px 0;
    }

    /* ===== STATS ===== */
    .stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      font-size: 13px;
      color: #555;
      font-weight: 600;
    }

    .stat-item { display: flex; align-items: center; gap: 6px; }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.green  { background: #00b36b; box-shadow: 0 0 6px rgba(0,179,107,0.6); }
    .dot.purple { background: #6c3de8; }

    /* ===== FOOTER ===== */
    .glowing-text {
      margin-top: 18px;
      margin-bottom: 30px;
      font-size: 12px;
      font-weight: 600;
      color: #6c3de8;
      text-align: center;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .box { padding: 28px 18px; }
      #copy span { font-size: 16px; }
    }
  </style>
</head>
<body>

  <!-- BANNIÈRE -->
  <div class="banner">
    <img src="https://files.catbox.moe/36ypp0.jpg" alt="Bannière">
    <div class="banner-overlay"></div>
  </div>

  <!-- LOGO -->
  <div class="logo-wrap">
    <img src="https://files.catbox.moe/gi7bzj.jpg" alt="Logo MINI BOT DEV SHADOW">
  </div>

  <!-- TITRE -->
  <div class="title-block">
    <h1>
      <span class="mini">MINI</span>
      <span class="bot"> BOT </span>
      <span class="shadow">DEV SHADOW</span>
    </h1>
    <span class="badge">⚡ BOT PAIRING BY DEV SHADOW</span>
  </div>

  <!-- MAIN -->
  <div class="container">
    <div class="box" id="box">

      <div class="icon-wrapper">
        <i class="fa-brands fa-whatsapp"></i>
      </div>

      <h2 class="centered-text">Connexion WhatsApp</h2>
      <p class="sub-text">📱 Entrez votre numéro avec l'indicatif pays</p>

      <div class="input-container">
        <div class="input-wrapper">
          <i class="fa-solid fa-phone"></i>
          <input placeholder="Ex: 221XXXXXXXX" type="number" id="number">
        </div>
        <button id="submit">
          <span>⚡ Générer le Code ⚡</span>
        </button>
      </div>

      <a id="waiting-message">⏳ Génération en cours...</a>
      <br>
      <main id="pair"></main>

      <div class="divider"></div>

      <div class="stats">
        <div class="stat-item">
          <span class="dot green"></span>
          <span>ONLINE</span>
        </div>
        <div class="stat-item">
          <span class="dot purple"></span>
          <span id="sessionCount">0</span>&nbsp;SESSIONS
        </div>
      </div>

    </div>
  </div>

  <div class="glowing-text">⚡ MINI DEV SHADOW SYSTEM V2.0 ⚡</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    let a = document.getElementById("pair");
    let b = document.getElementById("submit");
    let c = document.getElementById("number");

    async function Copy() {
      let obj = document.getElementById("copy");
      let text = obj.innerHTML;
      await navigator.clipboard.writeText(obj.innerText.replace('CODE: ', ''));
      obj.innerHTML = '<span style="color:#00b36b;font-size:16px;">✓ COPIÉ !</span>';
      setTimeout(() => { obj.innerHTML = text; }, 1200);
    }

    b.addEventListener("click", async (e) => {
      e.preventDefault();
      if (!c.value) {
        a.innerHTML = '<p style="color:#e53e3e;font-weight:600;text-align:center">⚠️ Entrez votre numéro WhatsApp.</p><br>';
      } else if (c.value.replace(/[^0-9]/g, "").length < 10) {
        a.innerHTML = '<p style="color:#e53e3e;font-weight:600;text-align:center">❌ Numéro invalide, trop court.</p><br>';
      } else {
        const bc = c.value.replace(/[^0-9]/g, "");
        c.type = "text";
        c.value = "+" + bc;
        c.style = "color:#6c3de8;font-size:16px;font-weight:700";
        a.innerHTML = '<p style="color:#6c3de8;font-weight:600;text-align:center">⏳ Patientez...</p><br>';
        let { data } = await axios(`/code?number=${bc}`);
        let code = data.code || "Service indisponible";
        a.innerHTML = `
          <div style="text-align:center">
            <div id="copy" onclick="Copy()" style="display:inline-block;padding:16px 22px;background:#f7f3ff;border:2px dashed #6c3de8;border-radius:12px;cursor:pointer;letter-spacing:4px;">
              CODE: <span style="font-family:monospace;font-size:22px;font-weight:800;color:#111;">${code}</span>
            </div>
            <p style="color:#888;font-size:12px;margin-top:8px;">👆 Cliquez pour copier</p>
          </div><br>
        `;
      }
    });

    // Session count
    async function updateSessionCount() {
      try {
        const res = await axios('/sessions/count');
        document.getElementById('sessionCount').textContent = res.data.count || 0;
      } catch(e) {}
    }
    setInterval(updateSessionCount, 5000);
    updateSessionCount();
  </script>
</body>
</html>
